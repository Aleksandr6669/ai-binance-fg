<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Binance Responsive Widget</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        
        html, body {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            background: linear-gradient(135deg, #FCD535 0%, #F3BA2F 100%);
            color: #121212;
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .widget-container {
            width: 100vw; height: 100vh;
            display: flex; flex-direction: column; justify-content: space-between;
            position: relative;
            cursor: pointer;
            padding: 12px;
            transition: transform 0.1s ease-out;
        }
        .widget-container:active { transform: scale(0.96); }
        
        /* Glass shine effect inside hero */
        .widget-container::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.3) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-20deg); animation: shine 6s infinite; pointer-events: none;
            z-index: 1;
        }
        @keyframes shine { 0% { left: -100%; } 20% { left: 200%; } 100% { left: 200%; } }

        .header-top { display: flex; justify-content: space-between; align-items: center; z-index: 2; position: relative; }
        .title-group { display: flex; align-items: center; gap: 6px; }
        .title-text { 
            font-size: 11px; font-weight: 800; color: rgba(0,0,0,0.6); 
            text-transform: uppercase; letter-spacing: 0.5px; display: flex; align-items: center; gap: 4px; 
        }
        
        .currency-badge {
            background: rgba(0,0,0,0.08); border: 1px solid rgba(0,0,0,0.05); color: #121212;
            font-weight: 800; font-size: 9px; padding: 3px 6px; border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
        }
        
        .controls { display: flex; align-items: center; gap: 6px; }
        .status-dot { width: 6px; height: 6px; background-color: #A0A0A5; border-radius: 50%; transition: background-color 0.3s; }
        .sync-icon { opacity: 0; transition: opacity 0.3s; color: rgba(0,0,0,0.6); }
        .sync-icon.loading { opacity: 1; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .balance-container { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; z-index: 2; position: relative; }
        .balance-usd { font-size: 26px; font-weight: 800; margin-bottom: 2px; letter-spacing: -1px; word-break: break-word; line-height: 1.1; }
        .balance-fiat { font-size: 11px; font-weight: 700; color: rgba(0,0,0,0.6); }

        .hero-footer {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.05); border-radius: 8px; padding: 6px 10px; border: 1px solid rgba(0,0,0,0.05);
            z-index: 2; position: relative;
        }
        .hf-item { display: flex; flex-direction: column; }
        .hf-item span:first-child { font-size: 8px; color: rgba(0,0,0,0.6); font-weight: 800; text-transform: uppercase; }
        .hf-item span:last-child { font-size: 11px; font-weight: 800; color: #121212; }

        /* =========================================
           RESPONSIVE WIDGET SIZES (MEDIA QUERIES)
           ========================================= */

        /* 1. SMALL WIDGET (< 200px) */
        @media (max-width: 200px) {
            .widget-container { padding: 10px; }
            .balance-usd { font-size: 22px; }
            .balance-fiat { font-size: 10px; }
            .hero-footer { padding: 5px 8px; }
            .hf-item span:first-child { font-size: 7px; }
            .hf-item span:last-child { font-size: 10px; }
        }

        /* 2. MEDIUM WIDGET (Wide, e.g., 329x155) */
        @media (min-width: 250px) and (max-height: 200px) {
            .widget-container { padding: 14px; }
            .balance-usd { font-size: 32px; }
            .balance-fiat { font-size: 13px; }
            .hero-footer { padding: 8px 12px; }
            .hf-item span:first-child { font-size: 9px; }
            .hf-item span:last-child { font-size: 13px; }
        }

        /* 3. LARGE WIDGET (Tall & Wide, e.g., 329x345) */
        @media (min-width: 250px) and (min-height: 250px) {
            .widget-container { padding: 20px; }
            .title-text { font-size: 14px; }
            .currency-badge { font-size: 12px; padding: 4px 8px; }
            .balance-usd { font-size: 46px; margin-bottom: 6px; }
            .balance-fiat { font-size: 16px; }
            .hero-footer { padding: 14px 20px; border-radius: 12px; }
            .hf-item span:first-child { font-size: 11px; }
            .hf-item span:last-child { font-size: 18px; }
            .status-dot { width: 8px; height: 8px; }
        }

    </style>
</head>
<body>
    <div class="widget-container" onclick="cycleCurrency()">
        
        <div class="header-top">
            <div class="title-group">
                <div class="title-text">Binance</div>
                <div class="currency-badge" id="currency-badge">UAH</div>
            </div>
            <div class="controls">
                <svg class="sync-icon" id="sync-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"></path><path d="M3 12a9 9 0 0 1 15-6.7L21 8"></path><path d="M3 22v-6h6"></path><path d="M21 12a9 9 0 0 1-15 6.7L3 16"></path></svg>
                <div class="status-dot status-indicator"></div>
            </div>
        </div>

        <div class="balance-container">
            <div class="balance-usd" id="usd-balance">Загрузка...</div>
            <div class="balance-fiat" id="fiat-balance">--</div>
        </div>

        <div class="hero-footer">
            <div class="hf-item"><span>Спот</span><span id="spot-val">--</span></div>
            <div class="hf-item" style="text-align: right;"><span>Боты</span><span id="bots-val">--</span></div>
        </div>

    </div>

    <script>
        const currencies = ['UAH', 'EUR', 'RUB', 'BTC'];
        let currentCurrencyIdx = 0;

        function cycleCurrency() {
            currentCurrencyIdx = (currentCurrencyIdx + 1) % currencies.length;
            const newFiat = currencies[currentCurrencyIdx];
            document.getElementById('currency-badge').innerText = newFiat;
            updateData(); // Instantly fetch new data
        }

        function setStatus(color, isLoad) {
            document.querySelectorAll('.status-indicator').forEach(el => {
                el.style.backgroundColor = color;
                el.style.boxShadow = color === '#0ECB81' ? '0 0 6px rgba(14,203,129,0.6)' : 'none';
            });
            const syncIcon = document.getElementById('sync-icon');
            if (isLoad) syncIcon.classList.add('loading');
            else syncIcon.classList.remove('loading');
        }

        async function updateData() {
            setStatus("#FFFFFF", true); // White dot when loading
            
            const key = localStorage.getItem('binance_api_key');
            const secret = localStorage.getItem('binance_api_secret');
            const fiat = currencies[currentCurrencyIdx];
            const sym = { 'UAH':'₴', 'EUR':'€', 'RUB':'₽', 'BTC':'₿' }[fiat] || fiat;

            if (!key || !secret) {
                document.getElementById('usd-balance').innerText = "Нет ключей";
                setStatus("#FF453A", false);
                return;
            }

            try {
                const response = await fetch(`/api/portfolio?fiat=${fiat}`, {
                    headers: { 'X-MBX-APIKEY': key, 'X-MBX-SECRET': secret }
                });

                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                if (data.error) throw new Error(data.error);

                document.getElementById('usd-balance').innerText = `$${data.total_usd.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
                
                let fiatStr = `≈ ${data.total_fiat.toLocaleString('en-US', {minimumFractionDigits: fiat==='BTC'?6:2, maximumFractionDigits: fiat==='BTC'?6:2})}`;
                if (fiat !== 'BTC' && fiat !== 'UAH') fiatStr = `≈ ${sym}${data.total_fiat.toLocaleString('en-US', {minimumFractionDigits: 2})}`;
                if (fiat === 'UAH' || fiat === 'BTC') fiatStr += ` ${sym}`;
                
                document.getElementById('fiat-balance').innerText = fiatStr;
                document.getElementById('spot-val').innerText = `$${data.spot_usd.toLocaleString('en-US', {maximumFractionDigits: 0})}`;
                document.getElementById('bots-val').innerText = `$${data.trading_bots_usd.toLocaleString('en-US', {maximumFractionDigits: 0})}`;
                
                setStatus("#0ECB81", false); // Green dot success

            } catch (err) {
                setStatus("#FF453A", false); // Red dot error
                document.getElementById('usd-balance').innerText = "Ошибка сети";
            }
        }

        // Initialize
        document.getElementById('currency-badge').innerText = currencies[currentCurrencyIdx];
        updateData();
        setInterval(updateData, 30000);
    </script>
</body>
</html>
