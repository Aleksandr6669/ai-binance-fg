<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Binance Widget</title>
    <meta name="js-widget-title" content="Binance Balance">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            /* EXACTLY LIKE THE MAIN APP HERO CARD */
            background: linear-gradient(135deg, #FCD535 0%, #F3BA2F 100%);
            color: #121212;
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .widget-container {
            width: 100vw;
            height: 100vh;
            padding: 12px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            cursor: pointer;
            transition: transform 0.15s ease-out;
            position: relative;
        }

        /* Glass shine effect inside hero */
        .widget-container::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.3) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-20deg);
            animation: shine 6s infinite;
            pointer-events: none;
        }

        @keyframes shine {
            0% { left: -100%; }
            20% { left: 200%; }
            100% { left: 200%; }
        }

        .widget-container:active {
            transform: scale(0.95);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 2;
        }

        .title-group {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .title {
            font-size: 10px;
            font-weight: 800;
            color: rgba(0, 0, 0, 0.6);
            letter-spacing: 0.5px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* Same as main app select */
        .currency-select {
            background: rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(0, 0, 0, 0.05);
            color: #121212;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 9px;
            padding: 4px 6px;
            border-radius: 6px;
            cursor: pointer;
            outline: none;
            -webkit-appearance: none;
            transition: background 0.3s;
        }
        .currency-select:active {
            background: rgba(0, 0, 0, 0.15);
        }

        .sync-icon {
            opacity: 0;
            transition: opacity 0.3s;
        }
        .sync-icon.loading {
            opacity: 1;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .status-dot {
            width: 6px;
            height: 6px;
            background-color: #A0A0A5; /* Grey by default */
            border-radius: 50%;
            transition: background-color 0.3s, box-shadow 0.3s;
        }

        .balance-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            flex-grow: 1;
            position: relative;
            z-index: 2;
        }

        .balance-usd {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 2px;
            letter-spacing: -1px;
            word-break: break-word;
            line-height: 1.1;
        }

        .balance-fiat {
            font-size: 11px;
            font-weight: 700;
            color: rgba(0, 0, 0, 0.6);
        }

        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.05);
            border-radius: 8px;
            padding: 6px 10px;
            border: 1px solid rgba(0,0,0,0.05);
            position: relative;
            z-index: 2;
        }

        .footer-item {
            display: flex;
            flex-direction: column;
        }

        .footer-item span:first-child {
            font-size: 8px;
            color: rgba(0, 0, 0, 0.6);
            font-weight: 800;
            text-transform: uppercase;
        }

        .footer-item span:last-child {
            font-size: 11px;
            font-weight: 800;
            color: #121212;
        }

        .error {
            color: #FF453A;
            font-size: 12px;
            font-weight: 800;
            text-align: center;
            margin-top: 10px;
        }
        
        .overlay-link {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 24px;
            height: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.1);
            border-radius: 50%;
            z-index: 100;
            color: #121212;
            text-decoration: none;
            opacity: 0;
            transition: opacity 0.3s;
        }
        body:hover .overlay-link {
            opacity: 1;
        }
    </style>
</head>
<body>
    <a href="/" class="overlay-link" title="Назад">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </a>

    <div class="widget-container" onclick="updateWidget()">
        <div class="header">
            <div class="title-group">
                <div class="title">
                    Binance
                    <svg class="sync-icon" id="sync-icon" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"></path><path d="M3 12a9 9 0 0 1 15-6.7L21 8"></path><path d="M3 22v-6h6"></path><path d="M21 12a9 9 0 0 1-15 6.7L3 16"></path></svg>
                </div>
                <select class="currency-select" id="currency-select" onclick="event.stopPropagation()" onchange="updateWidget()">
                    <option value="UAH">UAH</option>
                    <option value="EUR">EUR</option>
                    <option value="RUB">RUB</option>
                    <option value="BTC">BTC</option>
                </select>
            </div>
            <div class="status-dot" id="status-indicator"></div>
        </div>

        <div class="balance-container">
            <div class="balance-usd" id="usd-balance">Загрузка...</div>
            <div class="balance-fiat" id="fiat-balance">-- UAH</div>
            <div class="error" id="error-msg" style="display: none;"></div>
        </div>

        <div class="footer">
            <div class="footer-item">
                <span>Спот</span>
                <span id="spot-val">--</span>
            </div>
            <div class="footer-item" style="text-align: right;">
                <span>Боты</span>
                <span id="bots-val">--</span>
            </div>
        </div>
    </div>

    <script>
        function wLog(msg) {
            if (typeof __wweb2Log === "function") {
                __wweb2Log(msg);
            }
            console.log(msg);
        }

        function getCurrencySymbol(fiat) {
            const map = { 'UAH': '₴', 'EUR': '€', 'RUB': '₽', 'BTC': '₿' };
            return map[fiat] || fiat;
        }

        async function updateWidget() {
            wLog("Starting widget update");
            const syncIcon = document.getElementById('sync-icon');
            syncIcon.classList.add('loading');
            document.getElementById('status-indicator').style.backgroundColor = "#FCD535"; // Yellow while loading
            
            const key = localStorage.getItem('binance_api_key');
            const secret = localStorage.getItem('binance_api_secret');
            const fiat = document.getElementById('currency-select').value;
            const sym = getCurrencySymbol(fiat);

            if (!key || !secret) {
                document.getElementById('usd-balance').innerText = "Нет ключей";
                document.getElementById('usd-balance').style.fontSize = "18px";
                document.getElementById('fiat-balance').innerText = "Откройте сайт и войдите";
                document.getElementById('status-indicator').style.backgroundColor = "#FF453A"; // Red
                document.getElementById('status-indicator').style.boxShadow = "none";
                syncIcon.classList.remove('loading');
                wLog("API keys missing");
                return;
            }

            try {
                // Use relative URL so it strictly uses the Vercel domain the widget is loaded from
                const response = await fetch(`/api/portfolio?fiat=${fiat}`, {
                    method: 'GET',
                    headers: {
                        'X-MBX-APIKEY': key,
                        'X-MBX-SECRET': secret
                    }
                });

                if (!response.ok) {
                    throw new Error(`Ошибка сети: ${response.status}`);
                }

                const data = await response.json();
                if (data.error) throw new Error(data.error);

                document.getElementById('usd-balance').innerText = `$${data.total_usd.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
                
                let fiatStr = `≈ ${data.total_fiat.toLocaleString('en-US', {minimumFractionDigits: fiat === 'BTC' ? 6 : 2, maximumFractionDigits: fiat === 'BTC' ? 6 : 2})}`;
                if (fiat === 'BTC') fiatStr += ` ${sym}`;
                else fiatStr = `≈ ${sym}${data.total_fiat.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
                if (fiat === 'UAH') fiatStr = `≈ ${data.total_fiat.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})} ${sym}`;
                
                document.getElementById('fiat-balance').innerText = fiatStr;
                
                document.getElementById('spot-val').innerText = `$${data.spot_usd.toLocaleString('en-US', {minimumFractionDigits: 0, maximumFractionDigits: 0})}`;
                document.getElementById('bots-val').innerText = `$${data.trading_bots_usd.toLocaleString('en-US', {minimumFractionDigits: 0, maximumFractionDigits: 0})}`;
                
                document.getElementById('status-indicator').style.backgroundColor = "#0ECB81"; // Green 
                document.getElementById('status-indicator').style.boxShadow = "0 0 6px rgba(14, 203, 129, 0.6)";
                document.getElementById('error-msg').style.display = "none";
                wLog("Widget updated successfully");

            } catch (err) {
                wLog(`Error: ${err.message}`);
                document.getElementById('status-indicator').style.backgroundColor = "#FF453A"; // Red
                document.getElementById('status-indicator').style.boxShadow = "none";
                document.getElementById('error-msg').innerText = err.message;
                document.getElementById('error-msg').style.display = "block";
                document.getElementById('usd-balance').innerText = "Ошибка";
            } finally {
                syncIcon.classList.remove('loading');
            }
        }

        // Run immediately
        updateWidget();
        // Refresh every 30 seconds automatically
        setInterval(updateWidget, 30000);
    </script>
</body>
</html>
